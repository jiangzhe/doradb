name: build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

jobs:
  changes:
    runs-on: ubuntu-22.04
    outputs:
      run_build: ${{ steps.delta.outputs.run_build }}
      diff_range: ${{ steps.delta.outputs.diff_range }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Detect non-doc changes in current update
      id: delta
      shell: bash
      run: |
        set -euo pipefail

        event="${{ github.event_name }}"
        action="${{ github.event.action || '' }}"
        before="${{ github.event.before || '' }}"
        after="${{ github.event.after || '' }}"
        base_sha="${{ github.event.pull_request.base.sha || '' }}"
        head_sha="${{ github.event.pull_request.head.sha || github.sha }}"

        if [[ "$event" == "pull_request" && "$action" == "synchronize" && -n "$before" && -n "$after" ]]; then
          range="${before}...${after}"
        elif [[ "$event" == "pull_request" && -n "$base_sha" && -n "$head_sha" ]]; then
          range="${base_sha}...${head_sha}"
        elif [[ "$event" == "push" && -n "$before" && -n "$after" ]]; then
          range="${before}...${after}"
        else
          range="HEAD~1...HEAD"
        fi

        echo "diff_range=${range}" >> "$GITHUB_OUTPUT"

        files="$(git diff --name-only "$range" || true)"
        echo "changed files in ${range}:"
        printf '%s\n' "$files"

        run_build="false"
        while IFS= read -r file; do
          [[ -z "$file" ]] && continue
          if [[ "$file" != docs/* && "$file" != *.md ]]; then
            run_build="true"
            break
          fi
        done <<< "$files"

        echo "run_build=${run_build}" >> "$GITHUB_OUTPUT"
        echo "run_build=${run_build}"

  build:
    needs: changes
    if: needs.changes.outputs.run_build == 'true'
    runs-on: ubuntu-22.04
    steps:
    - name: Install libaio & lcov
      run: sudo apt-get install -y libaio1 libaio-dev lcov llvm
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        components: llvm-tools      
    - name: Install grcov
      run: cargo install grcov
    - name: Clippy (all features / all targets)
      run: cargo clippy --all-features --all-targets -- -D warnings
    - name: Build and Test (default features)
      env:
        RUSTFLAGS: "-Cinstrument-coverage -Ctarget-cpu=native"
        LLVM_PROFILE_FILE: "coverage/default/coverage-%p-%m.profraw"
        CARGO_TARGET_DIR: "target/coverage-default"
        RUST_BACKTRACE: "full"
      run: |
        mkdir -p coverage/default
        cargo build --verbose --all
        cargo test --verbose --all
    - name: Build and Test (no default features)
      env:
        RUSTFLAGS: "-Cinstrument-coverage -Ctarget-cpu=native"
        LLVM_PROFILE_FILE: "coverage/no-default/coverage-%p-%m.profraw"
        CARGO_TARGET_DIR: "target/coverage-no-default"
      run: |
        mkdir -p coverage/no-default
        cargo build --verbose --all --no-default-features
        cargo test --verbose --all --no-default-features
    - name: Generate coverage report (merged)
      run: |
        grcov . \
          --binary-path ./target \
          -s . -t lcov \
          --branch --ignore-not-existing \
          --ignore "target/" \
          --ignore "legacy/**" \
          --ignore "**/legacy/**" \
          --ignore "/home/runner/.cargo/registry/*" \
          --ignore "/home/runner/.cargo/git/*" \
          --ignore "*/.cargo/registry/*" \
          --ignore "*/.cargo/git/*" \
          --ignore "doradb-tpch-tests" \
          -o lcov.info
    - name: Upload to codecov.io
      uses: codecov/codecov-action@v3
      with:
        file: lcov.info
        token: ${{secrets.CODECOV_TOKEN}}

  docs-only:
    needs: changes
    if: needs.changes.outputs.run_build != 'true'
    runs-on: ubuntu-22.04
    steps:
    - name: Skip heavy CI for docs-only delta
      run: |
        echo "No non-doc changes detected in update range: ${{ needs.changes.outputs.diff_range }}"
        echo "Compile/test jobs are intentionally skipped."
