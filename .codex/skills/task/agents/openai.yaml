interface:
  display_name: "Task Design"
  short_description: "Deep-research, multi-round task design with approval gates"
  default_prompt: "Use $task create for deep-research design rounds with explicit approval gating, root-side task id allocation, concise unprefixed branch creation under 20 characters via `git worktree add -b <branch-name> .worktrees/<task-id> origin/main`, and task-doc creation in `.worktrees/<task-id>/docs/tasks/`; keep the branch name separate from the full task-doc slug. Use $task resolve from the task worktree, including `tools/task.rs resolve-task-next-id --task docs/tasks/<id>-<slug>.md` before RFC sync, and handle source backlog closure explicitly through $backlog. Use $task purge worktree from the `main` dispatch worktree with `tools/task.rs purge-worktrees`, and only remove worktrees in `--apply` mode when the task is implemented, the worktree is clean, and the same-name remote branch already contains the local tip."
