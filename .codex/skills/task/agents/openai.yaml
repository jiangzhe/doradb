interface:
  display_name: "Task Design"
  short_description: "Deep-research, multi-round task design with approval gates"
  default_prompt: "Use $task create for deep-research design rounds with explicit approval gating and a Round 1 `Source References` block. Round 1 must include at least two concrete repo references, including at least one docs/backlog/process reference and one code/tool/skill reference; if backlog input is provided, include the source backlog explicitly; use conversation references only when user constraints materially affect scope, and avoid low-value citation padding. Backlog input uses one or more docs/backlogs/<6digits>-<topic>.md files. Use $task resolve to sync implementation notes/open questions and auto-sync parent RFC phases via resolve-task-rfc. Source backlog closure is handled explicitly through $backlog (with tools/doc-id.rs search-by-id when input is id-only)."
