interface:
  display_name: "Task"
  short_description: "Task design, resolve, and worktree workflows"
  default_prompt: >
    Use $task create for deep-research design rounds that require explicit
    `First-Principles`, `Long-Term Evolution`, and `Original-Requirement-Fit`
    proposals, a best-overall recommendation rather than defaulting to the
    original request, RFC phase prerequisites/phase-local choices when the task
    belongs to an RFC, explicit approval gating, root-side task id allocation,
    concise unprefixed branch creation under 20 characters via
    `git worktree add -b <branch-name> .worktrees/<task-id> origin/main`, and
    task-doc creation in `.worktrees/<task-id>/docs/tasks/`; keep the branch
    name separate from the full task-doc slug. The resulting task doc must be
    decision-complete and sufficient for an implementation agent to start
    coding directly from the task worktree and doc without a separate planning
    command. Use $task resolve from the task worktree after implementation,
    tests, and review are complete and known implementation/review issues are
    fixed or explicitly accepted/deferred, including `tools/task.rs
    resolve-task-next-id --task docs/tasks/<id>-<slug>.md` before RFC sync,
    update RFC phase plans when proposals or implementation changed
    prerequisites/phase-local choices, handle source backlog closure explicitly
    through $backlog, and when deferring work into backlog include the current
    task/RFC source plus defer reason, findings, and direction hint.
    Use $task purge worktree from the `main` dispatch worktree with
    `tools/task.rs purge-worktrees`, and only remove worktrees in `--apply` mode
    when the task is implemented, the worktree is clean, and the same-name
    remote branch already contains the local tip.
